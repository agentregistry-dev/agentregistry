name: Chart Release

# Triggered when a GitHub Release is published (authoritative publish gate) or manually.
# The Release title/tag must match the chart version in Chart.yaml (enforced in the
# "Verify versions" step below).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   HELM_REGISTRY_PASSWORD  – PAT with packages:write, or leave unset to use GITHUB_TOKEN
#
# Optional repository secrets (defaults shown):
#   HELM_REGISTRY           – default: ghcr.io
#   HELM_REGISTRY_USERNAME  – default: github.actor
#
# Consumers can pull the published chart with:
#   helm pull oci://ghcr.io/agentregistry-dev/agentregistry/charts/agentregistry --version <ver>

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version to publish (must match Chart.yaml). Example: 0.3.0'
        required: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: lint + unit tests (safety gate before packaging)
  # ─────────────────────────────────────────────────────────────────────────────
  chart-tests:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.17.0'

      - name: Cache Helm plugins
        uses: actions/cache@v4
        with:
          path: ~/.local/share/helm/plugins
          key: ${{ runner.os }}-helm-plugins-unittest-${{ hashFiles('charts/agentregistry/Chart.yaml') }}
          restore-keys: |
            ${{ runner.os }}-helm-plugins-unittest-

      - name: Install helm-unittest plugin (if missing)
        run: |
          set -euo pipefail
          if helm plugin list | awk '{print $1}' | grep -q '^unittest$'; then
            echo "helm-unittest already installed"
          else
            helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3
          fi

      - name: Build chart dependencies
        run: helm dependency build charts/agentregistry

      - name: Lint chart (strict)
        run: helm lint charts/agentregistry --strict

      - name: Run helm-unittest
        run: |
          helm unittest charts/agentregistry \
            --file "tests/*_test.yaml"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: package and publish (runs only after tests pass)
  # ─────────────────────────────────────────────────────────────────────────────
  chart-publish:
    name: Package & publish chart to GHCR (OCI)
    needs: chart-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write    # needed to attach the .tgz to the GitHub Release
      packages: write    # needed to push OCI artifact to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Resolve the version we are publishing ────────────────────────────────
      - name: Resolve chart version
        id: version
        run: |
          set -euo pipefail

          CHART_VER=$(grep -E '^version:' charts/agentregistry/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "chart_version=${CHART_VER}" >> "$GITHUB_OUTPUT"

          # Determine the authoritative version for this run:
          #   - workflow_dispatch: use the user-supplied input
          #   - release event:     use the git tag (strip leading 'v')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_VER="${{ github.event.inputs.version }}"
          else
            # Strip 'v' prefix if present (tags like v0.3.0 → 0.3.0)
            TARGET_VER="${GITHUB_REF#refs/tags/}"
            TARGET_VER="${TARGET_VER#v}"
          fi
          echo "target_version=${TARGET_VER}" >> "$GITHUB_OUTPUT"
          echo "Chart.yaml version : ${CHART_VER}"
          echo "Target publish version: ${TARGET_VER}"

      # ── Guard: Chart.yaml version must match the tag / input ─────────────────
      - name: Verify Chart.yaml version matches release version
        run: |
          set -euo pipefail
          CHART_VER="${{ steps.version.outputs.chart_version }}"
          TARGET_VER="${{ steps.version.outputs.target_version }}"
          if [ "$CHART_VER" != "$TARGET_VER" ]; then
            echo "::error::Chart.yaml version (${CHART_VER}) does not match release version (${TARGET_VER})."
            echo "Update charts/agentregistry/Chart.yaml to version: ${TARGET_VER} before releasing."
            exit 1
          fi
          echo "Version check passed: ${CHART_VER}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.17.0'

      - name: Build chart dependencies
        run: helm dependency build charts/agentregistry

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Package chart
        run: |
          set -euo pipefail
          mkdir -p build/charts
          helm package charts/agentregistry -d build/charts
          echo "--- packaged files ---"
          ls -lh build/charts/

      # ── Release-time exact image check (generate one-off test)
      - name: Generate exact-image test for release
        if: always()
        run: |
          set -euo pipefail
          TARGET_VER="${{ steps.version.outputs.target_version }}"
          SERVER_IMAGE="ghcr.io/agentregistry-dev/agentregistry/server:${TARGET_VER}"
          mkdir -p build/tests
          printf '%s\n' \
            'suite: server image exact match' \
            'templates:' \
            '  - deployment.yaml' \
            'tests:' \
            '  - it: uses the exact server image' \
            '    asserts:' \
            '      - equal:' \
            '          path: spec.template.spec.containers[0].image' \
            "          value: \"${SERVER_IMAGE}\"" \
            > build/tests/server_exact_test.yaml

      - name: Run release-only exact-image test
        run: |
          set -euo pipefail
          helm unittest charts/agentregistry --file "build/tests/*_test.yaml"

      - name: Generate checksum
        run: |
          set -euo pipefail
          cd build/charts
          sha256sum ./*.tgz > checksums.txt
          cat checksums.txt

      # ── Push to GHCR (OCI) ───────────────────────────────────────────────────
      - name: Resolve registry credentials
        id: creds
        run: |
          # Use explicit secret if provided; fall back to built-in GITHUB_TOKEN.
          if [ -n "${{ secrets.HELM_REGISTRY_PASSWORD }}" ]; then
            echo "password_source=secret" >> "$GITHUB_OUTPUT"
          else
            echo "password_source=github_token" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR (OCI registry)
        run: |
          set -euo pipefail
          REGISTRY="${{ secrets.HELM_REGISTRY || 'ghcr.io' }}"
          USERNAME="${{ secrets.HELM_REGISTRY_USERNAME || github.actor }}"

          if [ "${{ steps.creds.outputs.password_source }}" = "secret" ]; then
            PASSWORD="${{ secrets.HELM_REGISTRY_PASSWORD }}"
          else
            PASSWORD="${{ secrets.GITHUB_TOKEN }}"
          fi

          printf "%s" "${PASSWORD}" | helm registry login "${REGISTRY}" \
            --username "${USERNAME}" \
            --password-stdin
          echo "Logged in to ${REGISTRY} as ${USERNAME}"

      - name: Push chart to GHCR
        run: |
          set -euo pipefail
          REGISTRY="${{ secrets.HELM_REGISTRY || 'ghcr.io' }}"
          REPO="${{ secrets.HELM_REPO || 'agentregistry-dev/agentregistry' }}"
          CHART_VER="${{ steps.version.outputs.chart_version }}"

          for pkg in build/charts/*.tgz; do
            [ -f "$pkg" ] || continue
            echo "Pushing ${pkg} → oci://${REGISTRY}/${REPO}/charts/agentregistry:${CHART_VER}"
            helm push "${pkg}" "oci://${REGISTRY}/${REPO}/charts"
          done

      # ── Attach artefacts to the GitHub Release ───────────────────────────────
      - name: Attach chart artefacts to GitHub Release
        # Only attach when triggered by a real release event (not workflow_dispatch)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/charts/*.tgz
            build/charts/checksums.txt

      # ── Log out for hygiene ───────────────────────────────────────────────────
      - name: Log out of registry
        if: always()
        run: |
          helm registry logout "${{ secrets.HELM_REGISTRY || 'ghcr.io' }}" || true
