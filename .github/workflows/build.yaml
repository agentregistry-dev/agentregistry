name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  merge_group:
    branches: [ main ]
    types: [ checks_requested ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: "go.mod"
        cache-dependency-path: |
          go.sum
          tools/go.sum

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.9.x
        cache: npm
        cache-dependency-path: ui/package-lock.json

    - name: Install UI Dependencies
      run: npm ci
      working-directory: ui

    - name: Run UI Tests
      run: npm test
      working-directory: ui

    - name: Build UI
      run: make build-ui

    - name: Start environment
      run: make run-docker

    - name: Run Integration Tests
      run: make test

    - name: Run CLI e2e tests
      # Builds the arctl binary and exercises it as a subprocess.
      # The no-DB cases run unconditionally; the DB-required cases
      # connect to the Postgres started by `make run-docker` above.
      run: make test-cli-e2e
