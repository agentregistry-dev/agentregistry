name: Chart Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'charts/**'
      - '.github/workflows/chart-tests.yml'
      - 'Makefile'
  pull_request:
    branches: [ main ]
    paths:
      - 'charts/**'
      - '.github/workflows/chart-tests.yml'
      - 'Makefile'
  workflow_dispatch:

jobs:
  chart-tests:
    name: Helm chart lint & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.17.0'

      # Cache the helm-unittest plugin dir so repeated runs skip re-downloading.
      - name: Cache Helm plugins
        uses: actions/cache@v4
        id: helm-plugins-cache
        with:
          path: ~/.local/share/helm/plugins
          key: ${{ runner.os }}-helm-plugins-unittest-${{ hashFiles('charts/agentregistry/Chart.yaml') }}
          restore-keys: |
            ${{ runner.os }}-helm-plugins-unittest-

      - name: Install helm-unittest plugin (if missing)
        # The cache may already have the plugin; the check avoids a redundant install.
        run: |
          set -euo pipefail
          if helm plugin list | awk '{print $1}' | grep -q '^unittest$'; then
            echo "helm-unittest already installed (from cache or prior install)"
          else
            echo "Installing helm-unittest plugin..."
            helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3
          fi

      - name: Show Helm and plugin versions
        run: |
          helm version --short
          helm plugin list

      - name: Build chart dependencies
        run: |
          set -euo pipefail
          helm dependency build charts/agentregistry

      - name: Lint chart (default values)
        run: |
          set -euo pipefail
          helm lint charts/agentregistry

      - name: Lint chart (strict mode)
        run: |
          set -euo pipefail
          helm lint charts/agentregistry --strict

      - name: Render templates (smoke test)
        run: |
          set -euo pipefail
          mkdir -p /tmp/chart-render
          helm template test-release charts/agentregistry \
            --values charts/agentregistry/values.yaml \
            > /tmp/chart-render/rendered.yaml
          echo "--- rendered manifest line count ---"
          wc -l /tmp/chart-render/rendered.yaml

      - name: Run helm-unittest
        run: |
          set -euo pipefail
          helm unittest charts/agentregistry \
            --helm3 \
            --file "tests/*_test.yaml"

      - name: Upload rendered manifests (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests
          path: /tmp/chart-render/rendered.yaml
          retention-days: 3
