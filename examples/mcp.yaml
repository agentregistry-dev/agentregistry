apiVersion: ar.dev/v1alpha1
kind: MCPServer
metadata:
  name: acme-fetch
spec:
  title: Fetch Server
  description: "Fetches and extracts content from URLs"
  source:
    package:
      registryType: oci
      identifier: localhost:5001/acme/fetch:1.0.0
      runtimeHint: docker                       # optional: hint for local runtime
      transport:
        type: stdio                             # stdio | sse | streamable-http
      # mcpName declares the upstream MCP-ecosystem catalogue identity
      # this package claims. Optional. Required only when registering a
      # public-registry package whose published mcp name label uses the `namespace/name`
      # shape that metadata.name cannot represent.
      # mcpName: io.example.acme/fetch
