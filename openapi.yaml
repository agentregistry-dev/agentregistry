        name: serverName
        required: true
        schema:
          description: URL-encoded '<namespace>/<name>' server name.
          type: string
      - description: A specific version tag, or 'latest'.
        in: path
        name: version
        required: true
        schema:
          description: A specific version tag, or 'latest'.
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
