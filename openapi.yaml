components:
  schemas:
    Agent:
      additionalProperties: false
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/AgentSpec'
        status:
          $ref: '#/components/schemas/Status'
      required:
      - metadata
      - spec
      - apiVersion
      - kind
      type: object
    AgentSource:
      additionalProperties: false
      properties:
        harness:
          $ref: '#/components/schemas/HarnessConfig'
        image:
          type: string
        repository:
          $ref: '#/components/schemas/Repository'
      type: object
    AgentSpec:
      additionalProperties: false
      properties:
        description:
          type: string
        instructions:
          $ref: '#/components/schemas/ResourceRef'
        mcpServers:
          items:
            $ref: '#/components/schemas/ResourceRef'
          type:
          - array
          - "null"
        modelName:
          type: string
        modelProvider:
          type: string
        plugins:
          items:
            $ref: '#/components/schemas/ResourceRef'
          type:
          - array
          - "null"
        skills:
          items:
            $ref: '#/components/schemas/ResourceRef'
          type:
          - array
          - "null"
        source:
          $ref: '#/components/schemas/AgentSource'
        title:
          type: string
      type: object
    ApplyResult:
      additionalProperties: false
      properties:
        apiVersion:
          type: string
        error:
          type: string
        kind:
          type: string
        name:
          type: string
        namespace:
          type: string
        status:
          type: string
        tag:
          type: string
      required:
      - name
      - status
      type: object
    ApplyResultsResponse:
      additionalProperties: false
      properties:
        results:
          items:
            $ref: '#/components/schemas/ApplyResult'
          type:
          - array
          - "null"
      required:
      - results
      type: object
    CommandEntry:
      additionalProperties: false
      properties:
        allowedTools:
          items:
            type: string
          type:
          - array
          - "null"
        argumentHint:
          type: string
        content:
          type: string
        description:
          type: string
        model:
          type: string
        source:
          type: string
      type: object
    CommandsField:
      additionalProperties: false
      properties:
        Map:
          additionalProperties:
            $ref: '#/components/schemas/CommandEntry'
          type: object
        Paths:
          $ref: '#/components/schemas/PathOrPaths'
      required:
      - Paths
      - Map
      type: object
    Condition:
      additionalProperties: false
      properties:
        lastTransitionTime:
          format: date-time
          type: string
        message:
          type: string
        reason:
          type: string
        status:
          type: string
        type:
          type: string
      required:
      - type
      - status
      type: object
    Deployment:
      additionalProperties: false
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/DeploymentSpec'
        status:
          $ref: '#/components/schemas/Status'
      required:
      - metadata
      - spec
      - apiVersion
      - kind
      type: object
    DeploymentRef:
      additionalProperties: false
      properties:
        name:
          type: string
        namespace:
          type: string
      required:
      - name
      type: object
    DeploymentSpec:
      additionalProperties: false
      properties:
        deploymentRefs:
          items:
            $ref: '#/components/schemas/DeploymentRef'
          type:
          - array
          - "null"
        desiredState:
          type: string
        env:
          additionalProperties:
            type: string
          type: object
        harnessPolicy:
          $ref: '#/components/schemas/HarnessPolicy'
        runtimeConfig:
          additionalProperties: {}
          type: object
        runtimeRef:
          $ref: '#/components/schemas/ResourceRef'
        targetRef:
          $ref: '#/components/schemas/ResourceRef'
      required:
      - targetRef
      - runtimeRef
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        detail:
          description: A human-readable explanation specific to this occurrence of
            the problem.
          examples:
          - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: '#/components/schemas/ErrorDetail'
          type:
          - array
          - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of
            the problem.
          examples:
          - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
          - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value
            should not change between occurrences of the error.
          examples:
          - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
          - https://example.com/errors/example
          format: uri
          type: string
      type: object
    HTTPHeader:
      additionalProperties: false
      properties:
        name:
          type: string
        value:
          type: string
      required:
      - name
      type: object
    HarnessConfig:
      additionalProperties: false
      properties:
        type:
          type: string
        version:
          type: string
      required:
      - type
      type: object
    HarnessPolicy:
      additionalProperties: false
      properties:
        permissionMode:
          type: string
      type: object
    HealthBody:
      additionalProperties: false
      properties:
        platform_mode:
          description: Platform mode
          enum:
          - docker
          - kubernetes
          examples:
          - docker
          type: string
        status:
          description: Health status
          examples:
          - ok
          type: string
      required:
      - status
      type: object
    HookEntry:
      additionalProperties: false
      properties:
        allowedEnvVars:
          items:
            type: string
          type:
          - array
          - "null"
        async:
          type: boolean
        asyncRewake:
          type: boolean
        command:
          type: string
        headers:
          additionalProperties:
            type: string
          type: object
        if:
          type: string
        input: {}
        model:
          type: string
        once:
          type: boolean
        prompt:
          type: string
        server:
          type: string
        shell:
          type: string
        statusMessage:
          type: string
        timeout:
          format: double
          type: number
        tool:
          type: string
        type:
          type: string
        url:
          type: string
      required:
      - type
      type: object
    HookMatcherGroup:
      additionalProperties: false
      properties:
        hooks:
          items:
            $ref: '#/components/schemas/HookEntry'
          type:
          - array
          - "null"
        matcher:
          type: string
      required:
      - hooks
      type: object
    HooksField:
      additionalProperties: false
      properties:
        Events:
          additionalProperties:
            items:
              $ref: '#/components/schemas/HookMatcherGroup'
            type:
            - array
            - "null"
          type: object
        Path:
          type: string
        Raw: {}
      required:
      - Path
      - Events
      - Raw
      type: object
    LSPServerEntry:
      additionalProperties: false
      properties:
        args:
          items:
            type: string
          type:
          - array
          - "null"
        command:
          type: string
        env:
          additionalProperties:
            type: string
          type: object
        extensionToLanguage:
          additionalProperties:
            type: string
          type: object
        initializationOptions: {}
        maxRestarts:
          format: int64
          type: integer
        settings: {}
        startupTimeout:
          format: int64
          type: integer
        transport:
          type: string
        workspaceFolder:
          type: string
      required:
      - command
      - extensionToLanguage
      type: object
    LSPServersField:
      additionalProperties: false
      properties:
        Path:
          type: string
        Raw: {}
        Servers:
          additionalProperties:
            $ref: '#/components/schemas/LSPServerEntry'
          type: object
      required:
      - Path
      - Servers
      - Raw
      type: object
    ListMetadata:
      additionalProperties: false
      properties:
        count:
          format: int64
          type: integer
        nextCursor:
          type: string
      required:
      - count
      type: object
    ListOutputAgentBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/Agent'
          type:
          - array
          - "null"
        nextCursor:
          type: string
      required:
      - items
      type: object
    ListOutputDeploymentBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/Deployment'
          type:
          - array
          - "null"
        nextCursor:
          type: string
      required:
      - items
      type: object
    ListOutputMCPServerBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/MCPServer'
          type:
          - array
          - "null"
        nextCursor:
          type: string
      required:
      - items
      type: object
    ListOutputPluginBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/Plugin'
          type:
          - array
          - "null"
        nextCursor:
          type: string
      required:
      - items
      type: object
    ListOutputPromptBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/Prompt'
          type:
          - array
          - "null"
        nextCursor:
          type: string
      required:
      - items
      type: object
    ListOutputRuntimeBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/Runtime'
          type:
          - array
          - "null"
        nextCursor:
          type: string
      required:
      - items
      type: object
    ListOutputSkillBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/Skill'
          type:
          - array
          - "null"
        nextCursor:
          type: string
      required:
      - items
      type: object
    MCPArgument:
      additionalProperties: false
      properties:
        name:
          type: string
        type:
          type: string
        value:
          type: string
      required:
      - type
      type: object
    MCPKeyValueInput:
      additionalProperties: false
      properties:
        isRequired:
          type: boolean
        name:
          type: string
        value:
          type: string
      required:
      - name
      type: object
    MCPPackage:
      additionalProperties: false
      properties:
        launch:
          $ref: '#/components/schemas/MCPPackageLaunch'
        origin:
          $ref: '#/components/schemas/MCPPackageOrigin'
        transport:
          $ref: '#/components/schemas/MCPTransport'
      required:
      - origin
      - transport
      type: object
    MCPPackageLaunch:
      additionalProperties: false
      properties:
        args:
          items:
            $ref: '#/components/schemas/MCPArgument'
          type:
          - array
          - "null"
        command:
          type: string
        env:
          items:
            $ref: '#/components/schemas/MCPKeyValueInput'
          type:
          - array
          - "null"
      type: object
    MCPPackageOrigin:
      additionalProperties: false
      properties:
        identifier:
          type: string
        npm:
          $ref: '#/components/schemas/MCPPackageOriginNPM'
        oci:
          $ref: '#/components/schemas/MCPPackageOriginOCI'
        pypi:
          $ref: '#/components/schemas/MCPPackageOriginPyPI'
        type:
          type: string
      required:
      - type
      - identifier
      type: object
    MCPPackageOriginNPM:
      additionalProperties: false
      properties:
        mirror:
          type: string
        serverName:
          type: string
        version:
          type: string
      required:
      - version
      - serverName
      type: object
    MCPPackageOriginOCI:
      additionalProperties: false
      properties:
        serverName:
          type: string
      required:
      - serverName
      type: object
    MCPPackageOriginPyPI:
      additionalProperties: false
      properties:
        mirror:
          type: string
        serverName:
          type: string
        version:
          type: string
      required:
      - version
      - serverName
      type: object
    MCPRemote:
      additionalProperties: false
      properties:
        headers:
          items:
            $ref: '#/components/schemas/HTTPHeader'
          type:
          - array
          - "null"
        type:
          type: string
        url:
          type: string
      required:
      - type
      - url
      type: object
    MCPServer:
      additionalProperties: false
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/MCPServerSpec'
        status:
          $ref: '#/components/schemas/Status'
      required:
      - metadata
      - spec
      - apiVersion
      - kind
      type: object
    MCPServerEntry:
      additionalProperties: false
      properties:
        args:
          items:
            type: string
          type:
          - array
          - "null"
        command:
          type: string
        env:
          additionalProperties:
            type: string
          type: object
        headers:
          additionalProperties:
            type: string
          type: object
        headersHelper:
          type: string
        oauth:
          $ref: '#/components/schemas/MCPServerOAuth'
        type:
          type: string
        url:
          type: string
      type: object
    MCPServerOAuth:
      additionalProperties: false
      properties:
        authServerMetadataUrl:
          type: string
        callbackPort:
          format: int64
          type: integer
        clientId:
          type: string
        scopes:
          items:
            type: string
          type:
          - array
          - "null"
      type: object
    MCPServerSource:
      additionalProperties: false
      properties:
        package:
          $ref: '#/components/schemas/MCPPackage'
        repository:
          $ref: '#/components/schemas/Repository'
      type: object
    MCPServerSpec:
      additionalProperties: false
      properties:
        description:
          type: string
        remote:
          $ref: '#/components/schemas/MCPRemote'
        source:
          $ref: '#/components/schemas/MCPServerSource'
        title:
          type: string
      type: object
    MCPServersField:
      additionalProperties: false
      properties:
        Path:
          type: string
        Raw: {}
        Servers:
          additionalProperties:
            $ref: '#/components/schemas/MCPServerEntry'
          type: object
      required:
      - Path
      - Servers
      - Raw
      type: object
    MCPTransport:
      additionalProperties: false
      properties:
        path:
          type: string
        port:
          format: int32
          minimum: 0
          type: integer
        type:
          type: string
      required:
      - type
      type: object
    MonitorEntry:
      additionalProperties: false
      properties:
        command:
          type: string
        description:
          type: string
        name:
          type: string
        when:
          type: string
      required:
      - name
      - command
      - description
      type: object
    MonitorsField:
      additionalProperties: false
      properties:
        Entries:
          items:
            $ref: '#/components/schemas/MonitorEntry'
          type:
          - array
          - "null"
        Path:
          type: string
      required:
      - Path
      - Entries
      type: object
    ObjectMeta:
      additionalProperties: false
      properties:
        annotations:
          additionalProperties:
            type: string
          type: object
        createdAt:
          format: date-time
          type: string
        deletionTimestamp:
          format: date-time
          type: string
        labels:
          additionalProperties:
            type: string
          type: object
        name:
          type: string
        namespace:
          type: string
        tag:
          type: string
        uid:
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
      - name
      type: object
    OfficialMeta:
      additionalProperties: false
      properties:
        isLatest:
          type: boolean
        publishedAt:
          type: string
        status:
          type: string
        statusChangedAt:
          type: string
        updatedAt:
          type: string
      required:
      - isLatest
      type: object
    PathOrPaths:
      additionalProperties: false
      properties:
        Values:
          items:
            type: string
          type:
          - array
          - "null"
        WasArray:
          type: boolean
      required:
      - Values
      - WasArray
      type: object
    PingBody:
      additionalProperties: false
      properties:
        pong:
          description: Ping response
          examples:
          - true
          type: boolean
      required:
      - pong
      type: object
    Plugin:
      additionalProperties: false
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/PluginSpec'
        status:
          $ref: '#/components/schemas/PluginStatus'
      required:
      - metadata
      - spec
      - apiVersion
      - kind
      type: object
    PluginAuthor:
      additionalProperties: false
      properties:
        email:
          type: string
        name:
          type: string
        url:
          type: string
      required:
      - name
      type: object
    PluginChannel:
      additionalProperties: false
      properties:
        displayName:
          type: string
        server:
          type: string
        userConfig:
          additionalProperties:
            $ref: '#/components/schemas/PluginUserConfigField'
          type: object
      required:
      - server
      type: object
    PluginDependency:
      additionalProperties: false
      properties:
        marketplace:
          type: string
        name:
          type: string
        version:
          type: string
      type: object
    PluginExperimental:
      additionalProperties: false
      properties:
        monitors:
          $ref: '#/components/schemas/MonitorsField'
        themes:
          $ref: '#/components/schemas/PathOrPaths'
      type: object
    PluginHook:
      additionalProperties: false
      properties:
        event:
          type: string
        type:
          type: string
      required:
      - event
      type: object
    PluginInventory:
      additionalProperties: false
      properties:
        agents:
          items:
            type: string
          type:
          - array
          - "null"
        commands:
          items:
            type: string
          type:
          - array
          - "null"
        executables:
          items:
            type: string
          type:
          - array
          - "null"
        hooks:
          items:
            $ref: '#/components/schemas/PluginHook'
          type:
          - array
          - "null"
        mcpServers:
          items:
            type: string
          type:
          - array
          - "null"
        skills:
          items:
            $ref: '#/components/schemas/PluginSkill'
          type:
          - array
          - "null"
      type: object
    PluginManifest:
      additionalProperties: false
      properties:
        $schema:
          type: string
        agents:
          $ref: '#/components/schemas/PathOrPaths'
        author:
          $ref: '#/components/schemas/PluginAuthor'
        channels:
          items:
            $ref: '#/components/schemas/PluginChannel'
          type:
          - array
          - "null"
        commands:
          $ref: '#/components/schemas/CommandsField'
        defaultEnabled:
          type: boolean
        dependencies:
          items:
            $ref: '#/components/schemas/PluginDependency'
          type:
          - array
          - "null"
        description:
          type: string
        displayName:
          type: string
        experimental:
          $ref: '#/components/schemas/PluginExperimental'
        homepage:
          type: string
        hooks:
          $ref: '#/components/schemas/HooksField'
        keywords:
          items:
            type: string
          type:
          - array
          - "null"
        license:
          type: string
        lspServers:
          $ref: '#/components/schemas/LSPServersField'
        mcpServers:
          $ref: '#/components/schemas/MCPServersField'
        monitors:
          $ref: '#/components/schemas/MonitorsField'
        name:
          type: string
        outputStyles:
          $ref: '#/components/schemas/PathOrPaths'
        repository:
          type: string
        settings: {}
        skills:
          $ref: '#/components/schemas/PathOrPaths'
        themes:
          $ref: '#/components/schemas/PathOrPaths'
        userConfig:
          additionalProperties:
            $ref: '#/components/schemas/PluginUserConfigField'
          type: object
        version:
          type: string
      required:
      - name
      type: object
    PluginResolvedSource:
      additionalProperties: false
      properties:
        commit:
          type: string
        digest:
          type: string
        type:
          type: string
      required:
      - type
      type: object
    PluginSkill:
      additionalProperties: false
      properties:
        description:
          type: string
        name:
          type: string
      required:
      - name
      type: object
    PluginSource:
      additionalProperties: false
      properties:
        git:
          $ref: '#/components/schemas/PluginSourceGit'
        oci:
          $ref: '#/components/schemas/PluginSourceOCI'
        type:
          type: string
      required:
      - type
      type: object
    PluginSourceGit:
      additionalProperties: false
      properties:
        repository:
          $ref: '#/components/schemas/Repository'
      required:
      - repository
      type: object
    PluginSourceOCI:
      additionalProperties: false
      properties:
        reference:
          type: string
      required:
      - reference
      type: object
    PluginSpec:
      additionalProperties: false
      properties:
        description:
          type: string
        harnesses:
          items:
            type: string
          type:
          - array
          - "null"
        source:
          $ref: '#/components/schemas/PluginSource'
        title:
          type: string
      type: object
    PluginStatus:
      additionalProperties: false
      properties:
        conditions:
          items:
            $ref: '#/components/schemas/Condition'
          type:
          - array
          - "null"
        details: {}
        inventory:
          $ref: '#/components/schemas/PluginInventory'
        manifest:
          $ref: '#/components/schemas/PluginManifest'
        resolvedSource:
          $ref: '#/components/schemas/PluginResolvedSource'
      type: object
    PluginUserConfigField:
      additionalProperties: false
      properties:
        default: {}
        description:
          type: string
        max:
          format: double
          type: number
        min:
          format: double
          type: number
        multiple:
          type: boolean
        required:
          type: boolean
        sensitive:
          type: boolean
        title:
          type: string
        type:
          type: string
      required:
      - type
      - title
      - description
      type: object
    Prompt:
      additionalProperties: false
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/PromptSpec'
        status:
          $ref: '#/components/schemas/Status'
      required:
      - metadata
      - spec
      - apiVersion
      - kind
      type: object
    PromptSpec:
      additionalProperties: false
      properties:
        content:
          type: string
        description:
          type: string
      type: object
    Repository:
      additionalProperties: false
      properties:
        branch:
          type: string
        commit:
          type: string
        subfolder:
          type: string
        url:
          type: string
      type: object
    ResourceRef:
      additionalProperties: false
      properties:
        kind:
          type: string
        name:
          type: string
        namespace:
          type: string
        tag:
          type: string
      required:
      - kind
      - name
      type: object
    ResponseMeta:
      additionalProperties: false
      properties:
        io.modelcontextprotocol.registry/official:
          $ref: '#/components/schemas/OfficialMeta'
      type: object
    Runtime:
      additionalProperties: false
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/RuntimeSpec'
        status:
          $ref: '#/components/schemas/Status'
      required:
      - metadata
      - spec
      - apiVersion
