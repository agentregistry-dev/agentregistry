suite: Validation
templates:
  - validate.yaml

tests:
  # ── JWT key validation ───────────────────────────────────────────────────────

  - it: renders nothing when mode=bundled and jwtPrivateKey is set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when mode=external with url and jwtPrivateKey is set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.postgres.mode: external
      database.postgres.external.url: "postgres://user:pass@host:5432/db"
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when config.existingSecret is set (mode=external with url)
    set:
      config.existingSecret: my-existing-secret
      database.postgres.mode: external
      database.postgres.external.url: "postgres://user:pass@host:5432/db"
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when jwtPrivateKey is empty and no existingSecret is provided
    set:
      database.postgres.mode: bundled
    asserts:
      - failedTemplate:
          errorPattern: "CHART CONFIGURATION ERROR"

  - it: fails when jwtPrivateKey is not a valid hex string
    set:
      config.jwtPrivateKey: "not-hex!!"
    asserts:
      - failedTemplate:
          errorPattern: "CHART CONFIGURATION ERROR"

  # ── mode discriminator ──────────────────────────────────────────────────────

  - it: fails when database.postgres.mode is invalid
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.postgres.mode: invalid
    asserts:
      - failedTemplate:
          errorPattern: 'database.postgres.mode must be "bundled" or "external"'

  # ── mode=bundled skips external validation ──────────────────────────────────

  - it: renders nothing with mode=bundled even when no url
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
    asserts:
      - hasDocuments:
          count: 0

  # ── mode=external requires url or secretRef ────────────────────────────────

  - it: fails when mode=external and neither url nor secretRef.name is set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.postgres.mode: external
    asserts:
      - failedTemplate:
          errorPattern: "database.postgres.mode=external requires either"

  - it: renders nothing when mode=external and external.url is set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.postgres.mode: external
      database.postgres.external.url: "postgres://user:pass@host:5432/db"
    asserts:
      - hasDocuments:
          count: 0

  # ── secretRef-backed external Postgres ─────────────────────────────────────

  - it: renders nothing when mode=external and external.secretRef.name is set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.postgres.mode: external
      database.postgres.external.secretRef.name: my-postgres-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when external.url and external.secretRef.name are both set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.postgres.mode: external
      database.postgres.external.url: "postgres://user:pass@host:5432/db"
      database.postgres.external.secretRef.name: my-postgres-secret
    asserts:
      - failedTemplate:
          errorPattern: "mutually exclusive"
