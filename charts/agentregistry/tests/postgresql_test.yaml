suite: Bundled PostgreSQL
templates:
  - postgresql.yaml
  - secrets.yaml

tests:
  # ── Bundled enabled (default) ─────────────────────────────────────────────

  - it: renders PVC, Deployment, and Service when bundled is enabled
    template: postgresql.yaml
    asserts:
      - hasDocuments:
          count: 3

  - it: PVC has correct name and storage size
    template: postgresql.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-postgresql
      - equal:
          path: spec.resources.requests.storage
          value: 5Gi
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce

  - it: Deployment has correct name and Recreate strategy
    template: postgresql.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-postgresql
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: Deployment uses pgvector image
    template: postgresql.yaml
    documentIndex: 1
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: '^docker.io/pgvector/pgvector:pg16$'

  - it: Deployment has hardcoded pod security context
    template: postgresql.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 999
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 999
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true

  - it: Deployment has hardcoded container security context
    template: postgresql.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: Deployment references chart-managed secret for POSTGRES_PASSWORD
    template: postgresql.yaml
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-agentregistry
                key: POSTGRES_PASSWORD

  - it: Deployment uses global.existingSecret for POSTGRES_PASSWORD when set
    template: postgresql.yaml
    set:
      global.existingSecret: global-secret
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: global-secret
                key: POSTGRES_PASSWORD

  - it: Deployment has liveness and readiness probes
    template: postgresql.yaml
    documentIndex: 1
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 20
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 5

  - it: Deployment mounts PVC as data volume
    template: postgresql.yaml
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: RELEASE-NAME-agentregistry-postgresql

  - it: Deployment renders resources when set
    template: postgresql.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "1"

  - it: Service has correct name and port
    template: postgresql.yaml
    documentIndex: 2
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-postgresql
      - equal:
          path: spec.ports[0].port
          value: 5432

  # ── Bundled disabled ──────────────────────────────────────────────────────

  - it: renders nothing when bundled is disabled
    template: postgresql.yaml
    set:
      database.bundled.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # ── Custom auth values ────────────────────────────────────────────────────

  - it: uses custom bundled auth values
    template: postgresql.yaml
    set:
      database.bundled.auth.database: mydb
      database.bundled.auth.username: myuser
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DB
            value: mydb
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_USER
            value: myuser

  # ── Custom storage size ───────────────────────────────────────────────────

  - it: uses custom storage size
    template: postgresql.yaml
    set:
      database.bundled.storage: 10Gi
    documentIndex: 0
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi
