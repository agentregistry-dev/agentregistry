suite: Secrets
templates:
  - secrets.yaml

tests:
  # ── Default rendering ───────────────────────────────────────────────────────

  - it: renders one Secret by default (credentials)
    asserts:
      - hasDocuments:
          count: 1

  - it: is the credentials Secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry
      - equal:
          path: type
          value: Opaque

  - it: credentials Secret has standard labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME

  - it: credentials Secret contains POSTGRES_PASSWORD key
    asserts:
      - isNotNull:
          path: data["POSTGRES_PASSWORD"]

  - it: credentials Secret contains JWT key
    asserts:
      - isNotNull:
          path: data["AGENT_REGISTRY_JWT_PRIVATE_KEY"]

  - it: uses provided jwtPrivateKey value (base64-encoded)
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
    documentIndex: 0
    asserts:
      - equal:
          path: data["AGENT_REGISTRY_JWT_PRIVATE_KEY"]
          # base64("deadbeef1234567890abcdef")
          value: "ZGVhZGJlZWYxMjM0NTY3ODkwYWJjZGVm"

  - it: uses bundled auth password for POSTGRES_PASSWORD when bundled is enabled (default)
    set:
      database.bundled.auth.password: mybundledpass
    documentIndex: 0
    asserts:
      - equal:
          path: data["POSTGRES_PASSWORD"]
          # base64("mybundledpass")
          value: "bXlidW5kbGVkcGFzcw=="

  - it: uses database.external.password for POSTGRES_PASSWORD when bundled is disabled
    set:
      database.bundled.enabled: false
      database.external.password: mypassword
    documentIndex: 0
    asserts:
      - equal:
          path: data["POSTGRES_PASSWORD"]
          # base64("mypassword")
          value: "bXlwYXNzd29yZA=="

  # ── config.existingSecret omits AGENT_REGISTRY_JWT_PRIVATE_KEY ─────────────────────────────

  - it: omits AGENT_REGISTRY_JWT_PRIVATE_KEY when config.existingSecret is set
    set:
      config.existingSecret: my-creds
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: data["AGENT_REGISTRY_JWT_PRIVATE_KEY"]
      - isNotNull:
          path: data["POSTGRES_PASSWORD"]

  # ── database.external.existingSecret omits POSTGRES_PASSWORD (bundled disabled) ──────────

  - it: omits POSTGRES_PASSWORD when database.external.existingSecret is set (bundled disabled)
    set:
      database.bundled.enabled: false
      database.external.existingSecret: ext-db-secret
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: data["POSTGRES_PASSWORD"]
      - isNotNull:
          path: data["AGENT_REGISTRY_JWT_PRIVATE_KEY"]

  # ── Both existingSecrets suppress the Secret entirely (bundled disabled) ────

  - it: renders no Secret when both existingSecrets are set (bundled disabled)
    set:
      database.bundled.enabled: false
      config.existingSecret: my-creds
      database.external.existingSecret: ext-db-secret
    asserts:
      - hasDocuments:
          count: 0

  # ── global.existingSecret overrides both ─────────────────────────────────────

  - it: renders no Secret when global.existingSecret is set
    set:
      global.existingSecret: global-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: global.existingSecret overrides config.existingSecret and database.external.existingSecret
    set:
      global.existingSecret: global-secret
      config.existingSecret: my-creds
      database.external.existingSecret: ext-db-secret
    asserts:
      - hasDocuments:
          count: 0

  # ── Bundled enabled: Secret is always created (unless global.existingSecret) ─

  - it: renders Secret even when database.external.existingSecret is set if bundled is enabled
    set:
      database.external.existingSecret: ext-db-secret
    asserts:
      - hasDocuments:
          count: 1
      - isNotNull:
          path: data["POSTGRES_PASSWORD"]
