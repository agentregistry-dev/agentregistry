suite: Secrets
templates:
  - secrets.yaml

tests:
  # ── Default rendering ───────────────────────────────────────────────────────

  - it: renders two Secrets by default (credentials + kubeconfig)
    asserts:
      - hasDocuments:
          count: 2

  - it: first document is the credentials Secret
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry
      - equal:
          path: type
          value: Opaque

  - it: credentials Secret has standard labels
    documentIndex: 0
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME

  - it: credentials Secret contains POSTGRES_PASSWORD key
    documentIndex: 0
    asserts:
      - isNotNull:
          path: data["POSTGRES_PASSWORD"]

  - it: credentials Secret contains JWT key
    documentIndex: 0
    asserts:
      - isNotNull:
          path: data["AGENT_REGISTRY_JWT_PRIVATE_KEY"]

  # ── Kubeconfig secret ────────────────────────────────────────────────────────

  - it: second document is the kubeconfig Secret
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-kubeconfig
      - equal:
          path: type
          value: Opaque

  - it: kubeconfig Secret has stringData.config key
    documentIndex: 1
    asserts:
      - isNotNull:
          path: stringData.config

  # ── existingSecret suppresses credentials Secret ────────────────────────────

  - it: renders only kubeconfig Secret when existingSecret is set
    set:
      existingSecret: my-creds
    asserts:
      - hasDocuments:
          count: 1

  - it: the remaining Secret is kubeconfig when existingSecret is set
    set:
      existingSecret: my-creds
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-kubeconfig

  # ── kubeconfig.existingSecret suppresses kubeconfig Secret ──────────────────

  - it: renders only credentials Secret when kubeconfig.existingSecret is set
    set:
      kubeconfig.existingSecret: my-kube-secret
    asserts:
      - hasDocuments:
          count: 1

  - it: the remaining Secret is credentials when kubeconfig.existingSecret is set
    set:
      kubeconfig.existingSecret: my-kube-secret
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry

  # ── Both existingSecrets suppress all Secrets ────────────────────────────────

  - it: renders no Secrets when both existingSecret and kubeconfig.existingSecret are set
    set:
      existingSecret: my-creds
      kubeconfig.existingSecret: my-kube-secret
    asserts:
      - hasDocuments:
          count: 0

  # ── External DB with existingSecret omits POSTGRES_PASSWORD ─────────────────

  - it: omits POSTGRES_PASSWORD when using external DB existingSecret
    set:
      database.bundled.enabled: false
      database.external.existingSecret: ext-db-secret
    documentIndex: 0
    asserts:
      - notExists:
          path: data["POSTGRES_PASSWORD"]
      - isNotNull:
          path: data["AGENT_REGISTRY_JWT_PRIVATE_KEY"]

  # ── Provided secret values are encoded ──────────────────────────────────────

  - it: uses provided postgresPassword value (base64-encoded)
    set:
      secrets.autoGenerate: false
      secrets.postgresPassword: mypassword
    documentIndex: 0
    asserts:
      - equal:
          path: data["POSTGRES_PASSWORD"]
          # base64("mypassword")
          value: "bXlwYXNzd29yZA=="
