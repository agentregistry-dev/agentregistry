suite: NetworkPolicy
templates:
  - networkpolicy.yaml

tests:
  # ── Disabled by default ─────────────────────────────────────────────────────

  - it: renders nothing when networkPolicy.enabled is false (default)
    asserts:
      - hasDocuments:
          count: 0

  # ── Basic rendering ─────────────────────────────────────────────────────────

  - it: renders a NetworkPolicy when enabled
    set:
      networkPolicy.enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - hasDocuments:
          count: 1

  - it: has correct name when enabled
    set:
      networkPolicy.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry

  - it: has standard labels when enabled
    set:
      networkPolicy.enabled: true
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME

  - it: includes both Ingress and Egress policyTypes
    set:
      networkPolicy.enabled: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

  - it: podSelector uses selectorLabels
    set:
      networkPolicy.enabled: true
    asserts:
      - isSubset:
          path: spec.podSelector.matchLabels
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME

  # ── Ingress rules ────────────────────────────────────────────────────────────

  - it: allows all ingress when allowExternal is true
    set:
      networkPolicy.enabled: true
      networkPolicy.allowExternal: true
    asserts:
      - contains:
          path: spec.ingress
          content: {}

  - it: restricts ingress to pod namespace when allowExternal is false
    set:
      networkPolicy.enabled: true
      networkPolicy.allowExternal: false
    asserts:
      - isNotNull:
          path: spec.ingress[0].from
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 8080
            protocol: TCP
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 21212
            protocol: TCP

  # ── Egress rules ─────────────────────────────────────────────────────────────

  - it: allows all egress when allowExternalEgress is true
    set:
      networkPolicy.enabled: true
      networkPolicy.allowExternalEgress: true
    asserts:
      - contains:
          path: spec.egress
          content: {}

  - it: restricts egress and allows DNS when allowExternalEgress is false
    set:
      networkPolicy.enabled: true
      networkPolicy.allowExternalEgress: false
    asserts:
      - contains:
          path: spec.egress[0].ports
          content:
            port: 53
            protocol: UDP
      - contains:
          path: spec.egress[0].ports
          content:
            port: 53
            protocol: TCP

  - it: allows Kubernetes API egress when allowExternalEgress is false
    set:
      networkPolicy.enabled: true
      networkPolicy.allowExternalEgress: false
    asserts:
      - isNotNull:
          path: spec.egress

  - it: includes PostgreSQL egress rule when bundled DB is enabled and allowExternalEgress is false
    set:
      networkPolicy.enabled: true
      networkPolicy.allowExternalEgress: false
      database.bundled.enabled: true
    asserts:
      - isNotNull:
          path: spec.egress

  - it: does not include PostgreSQL podSelector egress when bundled DB is disabled
    set:
      networkPolicy.enabled: true
      networkPolicy.allowExternalEgress: false
      database.bundled.enabled: false
      database.external.host: mydb.example.com
      networkPolicy.extraEgress:
        - ports:
            - port: 5432
              protocol: TCP
    asserts:
      - isNotNull:
          path: spec.egress

  # ── Extra rules ──────────────────────────────────────────────────────────────

  - it: appends extraIngress rules
    set:
      networkPolicy.enabled: true
      networkPolicy.extraIngress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: monitoring
    asserts:
      - isNotNull:
          path: spec.ingress

  - it: appends extraEgress rules
    set:
      networkPolicy.enabled: true
      networkPolicy.allowExternalEgress: false
      networkPolicy.extraEgress:
        - ports:
            - port: 5432
              protocol: TCP
    asserts:
      - isNotNull:
          path: spec.egress
