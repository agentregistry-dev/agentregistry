{{- if .Values.database.bundled.enabled }}
{{/*
PersistentVolumeClaim — only created when persistence is enabled and no existing claim.
*/}}
{{- if and .Values.database.bundled.persistence.enabled (not .Values.database.bundled.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agentregistry.postgresql.fullname" . }}-data
  labels:
    {{- include "agentregistry.postgresql.labels" . | nindent 4 }}
  {{- if or .Values.database.bundled.persistence.keepOnUninstall .Values.database.bundled.persistence.annotations .Values.commonAnnotations }}
  annotations:
    {{- if .Values.database.bundled.persistence.keepOnUninstall }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- if .Values.database.bundled.persistence.annotations }}
    {{- toYaml .Values.database.bundled.persistence.annotations | nindent 4 }}
    {{- end }}
    {{- if .Values.commonAnnotations }}
    {{- toYaml .Values.commonAnnotations | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.database.bundled.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.database.bundled.persistence.size }}
  {{- include "agentregistry.storageClass" (dict "storageClass" .Values.database.bundled.persistence.storageClass "global" .Values.global) | nindent 2 }}
{{- end }}
---
{{/*
PostgreSQL Deployment with strategy: Recreate to avoid multi-attach issues.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentregistry.postgresql.fullname" . }}
  labels:
    {{- include "agentregistry.postgresql.labels" . | nindent 4 }}
  {{- $annotations := include "agentregistry.annotations" (dict "annotations" dict "context" $) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agentregistry.postgresql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentregistry.postgresql.selectorLabels" . | nindent 8 }}
        {{- if .Values.database.bundled.podLabels }}
        {{- toYaml .Values.database.bundled.podLabels | nindent 8 }}
        {{- end }}
        {{- if .Values.commonLabels }}
        {{- toYaml .Values.commonLabels | nindent 8 }}
        {{- end }}
      {{- if or .Values.database.bundled.podAnnotations .Values.commonAnnotations }}
      annotations:
        {{- if .Values.database.bundled.podAnnotations }}
        {{- toYaml .Values.database.bundled.podAnnotations | nindent 8 }}
        {{- end }}
        {{- if .Values.commonAnnotations }}
        {{- toYaml .Values.commonAnnotations | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      {{- include "agentregistry.imagePullSecrets" . | nindent 6 }}
      {{- $pgPodSec := include "agentregistry.podSecurityContext" .Values.database.bundled.podSecurityContext }}
      {{- if $pgPodSec }}
      securityContext:
        {{- $pgPodSec | nindent 8 }}
      {{- end }}
      {{- if .Values.database.bundled.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.database.bundled.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.database.bundled.tolerations }}
      tolerations:
        {{- toYaml .Values.database.bundled.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.database.bundled.affinity }}
      affinity:
        {{- toYaml .Values.database.bundled.affinity | nindent 8 }}
      {{- end }}
      containers:
        - name: postgresql
          image: {{ include "agentregistry.postgresql.image" . }}
          imagePullPolicy: {{ .Values.database.bundled.image.pullPolicy }}
          {{- $pgContainerSec := include "agentregistry.containerSecurityContext" .Values.database.bundled.containerSecurityContext }}
          {{- if $pgContainerSec }}
          securityContext:
            {{- $pgContainerSec | nindent 12 }}
          {{- end }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.bundled.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.database.bundled.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentregistry.passwordSecretName" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U {{ .Values.database.bundled.auth.username }} -d {{ .Values.database.bundled.auth.database }}
            initialDelaySeconds: {{ .Values.database.bundled.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.database.bundled.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.database.bundled.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.database.bundled.probes.liveness.failureThreshold }}
            successThreshold: {{ .Values.database.bundled.probes.liveness.successThreshold }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U {{ .Values.database.bundled.auth.username }} -d {{ .Values.database.bundled.auth.database }}
            initialDelaySeconds: {{ .Values.database.bundled.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.database.bundled.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.database.bundled.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.database.bundled.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.database.bundled.probes.readiness.successThreshold }}
          {{- $pgRes := include "agentregistry.resources" (dict "resources" .Values.database.bundled.resources "preset" .Values.database.bundled.resourcesPreset) }}
          {{- if $pgRes }}
          resources:
            {{- $pgRes | nindent 12 }}
          {{- end }}
          {{- if .Values.database.bundled.persistence.enabled }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          {{- end }}
      {{- if .Values.database.bundled.persistence.enabled }}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ .Values.database.bundled.persistence.existingClaim | default (printf "%s-data" (include "agentregistry.postgresql.fullname" .)) }}
      {{- end }}
---
{{/*
PostgreSQL Service
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentregistry.postgresql.fullname" . }}
  labels:
    {{- include "agentregistry.postgresql.labels" . | nindent 4 }}
  {{- $annotations := include "agentregistry.annotations" (dict "annotations" dict "context" $) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.database.bundled.service.type }}
  selector:
    {{- include "agentregistry.postgresql.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.database.bundled.service.port }}
      targetPort: 5432
      protocol: TCP
{{- end }}
