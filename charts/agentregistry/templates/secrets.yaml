{{/*
Credentials secret — auto-generates on first install when secrets.autoGenerate
is true. Uses `lookup` to preserve values across upgrades.
*/}}
{{- if not .Values.existingSecret }}
{{- $secretName := include "agentregistry.secretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingPgPass := "" }}
{{- $existingJwtKey := "" }}
{{- if and $existingSecret $existingSecret.data }}
  {{- $existingPgPass = index $existingSecret.data "POSTGRES_PASSWORD" | default "" | b64dec }}
  {{- $existingJwtKey = index $existingSecret.data "AGENT_REGISTRY_JWT_PRIVATE_KEY" | default "" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "agentregistry.labels" . | nindent 4 }}
  {{- $annotations := include "agentregistry.annotations" (dict "annotations" dict "context" $) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if not (and (not .Values.postgresql.enabled) .Values.externalDatabase.existingSecret) }}
  POSTGRES_PASSWORD: {{ include "agentregistry.secretValue" (dict "current" $existingPgPass "provided" .Values.secrets.postgresPassword "autoGenerate" .Values.secrets.autoGenerate "length" 32) | b64enc | quote }}
  {{- end }}
  AGENT_REGISTRY_JWT_PRIVATE_KEY: {{ include "agentregistry.secretValue" (dict "current" $existingJwtKey "provided" .Values.secrets.jwtPrivateKey "autoGenerate" .Values.secrets.autoGenerate "length" 64 "format" "hex") | b64enc | quote }}
{{- end }}
---
{{- if not .Values.kubeconfig.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentregistry.kubeconfigSecretName" . }}
  labels:
    {{- include "agentregistry.labels" . | nindent 4 }}
  {{- $annotations := include "agentregistry.annotations" (dict "annotations" dict "context" $) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  config: |
    {{- .Values.kubeconfig.content | nindent 4 }}
{{- end }}
