{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentregistry.fullname" . }}
  labels:
    {{- include "agentregistry.labels" . | nindent 4 }}
  {{- $annotations := include "agentregistry.annotations" (dict "annotations" dict "context" $) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "agentregistry.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowExternal }}
    - {}
    {{- else }}
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.service.targetPorts.http }}
          protocol: TCP
        - port: {{ .Values.service.targetPorts.grpc }}
          protocol: TCP
    {{- end }}
    {{- if .Values.networkPolicy.extraIngress }}
    {{- toYaml .Values.networkPolicy.extraIngress | nindent 4 }}
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowExternalEgress }}
    - {}
    {{- else }}
    {{/* Allow DNS */}}
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{/* Allow connections to PostgreSQL */}}
    {{- if .Values.database.bundled.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "agentregistry.postgresql.selectorLabels" . | nindent 14 }}
      ports:
        - port: 5432
          protocol: TCP
    {{- end }}
    {{/* Allow connections to Kubernetes API */}}
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- end }}
    {{- if .Values.networkPolicy.extraEgress }}
    {{- toYaml .Values.networkPolicy.extraEgress | nindent 4 }}
    {{- end }}
{{- end }}
