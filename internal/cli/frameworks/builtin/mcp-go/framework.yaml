apiVersion: arctl.dev/v1
name: mcp-go
type: mcp
framework: mcp-go
language: go
description: MCP server using the official Go SDK
templatesDir: ./templates
env:
  optional:
    - LOG_LEVEL
# Per-transport exec defaults. arctl init writes the block matching the
# requested --transport into spec.source.package.launch in the scaffolded
# mcp.yaml. {{.Port}} is templated from the --port flag at scaffold time
# (same Go text/template syntax used by build.command and run.command).
launch:
  stdio:
    command: /app/server
    args: []
  http:
    command: /app/server
    args:
      - "-http"
      - ":{{.Port}}"
localLaunch:
  stdio:
    command: go
    args:
      - run
      - ./cmd/server
  http:
    command: go
    args:
      - run
      - ./cmd/server
      - "-http"
      - ":{{.Port}}"
localInstall:
  command: ["go", "mod", "tidy"]
build:
  command: ["docker", "build", "{{if .Platform}}--platform={{.Platform}}{{end}}", "-t", "{{.Image}}", "{{.ProjectDir}}"]
run:
  # HTTP transport via the runtime's --http flag. Stdio mode is not used by
  # `arctl run` because it produces no useful state without an attached MCP
  # client.
  command: ["docker", "run", "--rm", "-p", "{{.Port}}:{{.Port}}",
            "{{.Image}}", "--http", "0.0.0.0:{{.Port}}"]
